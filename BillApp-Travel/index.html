<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TripSplit">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>TripSplit</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <link rel="stylesheet" href="../shared/core-ui.css">
    <link rel="stylesheet" href="style.css?v=36.0">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body ontouchstart="">
    <input type="file" id="camera-input" accept="image/*" style="display: none;">

    <div id="page-home" class="app-page active">
        <div class="header-section">
            <h1 style="color: white; font-size: 2rem;">Trips</h1>
            <div style="display: flex; gap: 10px; position: relative; top: 0; right: 0;">
                <button class="profile-settings-btn" id="btn-add-trip" style="position: static; width: 44px; height: 44px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="profile-settings-btn" id="btn-settings" style="position: static; width: 44px; height: 44px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
            </div>
        </div>
        
        <div class="content-scroll" id="trip-list-container">
            <div style="text-align: center; color: var(--text-dim); margin-top: 20px;" id="loading-trips">Loading Trips...</div>
        </div>

        <div class="fab-container">
            <button id="fab-home" class="aperture-btn fab-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="14.31" y1="8" x2="20.05" y2="17.94"></line><line x1="9.69" y1="8" x2="21.17" y2="8"></line><line x1="7.38" y1="12" x2="13.12" y2="2.06"></line><line x1="9.69" y1="16" x2="3.95" y2="6.06"></line><line x1="14.31" y1="16" x2="2.83" y2="16"></line><line x1="16.62" y1="12" x2="10.88" y2="21.94"></line></svg>
            </button>
        </div>
    </div>

    <div id="page-trip" class="app-page">
        <div class="header-section">
            <button id="btn-back-home" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <h2 id="trip-header-title" style="color: white; font-size: 1.4rem;">Trip Details</h2>
            <div style="display: flex; gap: 5px;">
                <button class="profile-settings-btn" id="btn-manual-add" style="position: static; width: 44px; height: 44px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="content-scroll" id="trip-timeline">
            <div class="glass-box" style="margin-bottom: 15px; opacity: 0.5;">
                <div style="text-align: center; color: var(--text-dim); font-size: 0.9rem;">Start of trip timeline</div>
            </div>
        </div>

        <div class="fab-container">
            <button id="fab-trip" class="aperture-btn fab-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="14.31" y1="8" x2="20.05" y2="17.94"></line><line x1="9.69" y1="8" x2="21.17" y2="8"></line><line x1="7.38" y1="12" x2="13.12" y2="2.06"></line><line x1="9.69" y1="16" x2="3.95" y2="6.06"></line><line x1="14.31" y1="16" x2="2.83" y2="16"></line><line x1="16.62" y1="12" x2="10.88" y2="21.94"></line></svg>
            </button>
        </div>
    </div>

    <div id="page-scanner" class="app-page dashboard-container">
        <div style="position: absolute; top: calc(env(safe-area-inset-top) + 20px); left: 20px; z-index: 100;">
            <button id="btn-cancel-scan" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="top-section">
            <button id="btn-snap" class="aperture-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="14.31" y1="8" x2="20.05" y2="17.94"></line><line x1="9.69" y1="8" x2="21.17" y2="8"></line><line x1="7.38" y1="12" x2="13.12" y2="2.06"></line><line x1="9.69" y1="16" x2="3.95" y2="6.06"></line><line x1="14.31" y1="16" x2="2.83" y2="16"></line><line x1="16.62" y1="12" x2="10.88" y2="21.94"></line></svg>
            </button>
        </div>
        <div class="dials-row">
            <div class="dial-container">
                <div class="dial-title">Tip %</div>
                <div class="dial-svg-wrapper" id="tip-wrapper">
                    <svg viewBox="0 0 100 100"><circle class="dial-bg" cx="50" cy="50" r="38"></circle><circle class="dial-progress" id="tip-ring" cx="50" cy="50" r="38"></circle><circle class="dial-thumb" id="tip-thumb" cx="50" cy="12" r="5"></circle></svg>
                    <div class="dial-center-text" id="tip-display">5%</div>
                </div>
            </div>
            <div class="dial-container">
                <div class="dial-title">Split Count</div>
                <div class="dial-svg-wrapper" id="split-wrapper">
                    <svg viewBox="0 0 100 100"><circle class="dial-bg" cx="50" cy="50" r="38"></circle><circle class="dial-progress" id="split-ring" cx="50" cy="50" r="38"></circle><circle class="dial-thumb" id="split-thumb" cx="50" cy="12" r="5"></circle></svg>
                    <div class="dial-center-text" id="split-display">1</div>
                </div>
            </div>
        </div>
        <div class="center-result-section">
            <div class="result-orb" id="result-orb">
                <div class="orb-glare"></div>
                <div class="orb-content">
                    <span class="orb-label">PER PERSON</span>
                    <h1 class="orb-amount" id="per-person-amount">$0.00</h1>
                </div>
            </div>
        </div>
        <div class="bottom-controls-row">
            <div class="manual-panel">
                <div class="glass-box">
                    <div class="input-line">
                        <label>Subtotal</label>
                        <div class="input-with-symbol"><span>$</span><input type="number" id="manual-subtotal" placeholder="0.00" step="0.01"></div>
                    </div>
                    <div class="divider"></div>
                    <div class="input-line">
                        <label id="tax-label">Tax</label>
                        <div class="input-with-symbol"><span>$</span><input type="number" id="manual-tax" placeholder="0.00" step="0.01"></div>
                    </div>
                </div>
            </div>
            <div class="actions-panel">
                <div class="action-wrapper">
                    <button class="action-circle-btn share-btn" id="btn-next" style="color: var(--accent-blue); border-color: var(--accent-blue);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </div>
                <div class="action-wrapper">
                    <button class="action-circle-btn done-btn" id="btn-done">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="basic-expense-modal" class="modal-overlay hidden">
        <div class="glass-modal-card" style="width: 90%; max-width: 400px; padding: 25px 20px;">
            <h3 class="modal-title" id="expense-modal-title" style="margin-bottom: 20px;">Add Expense</h3>
            <div style="width: 100%; display: flex; flex-direction: column; gap: 15px; text-align: left;">
                <div class="modal-input-glass" style="padding: 15px;">
                    <input type="text" id="basic-expense-title" placeholder="What did you pay for?" style="width: 100%; text-align: left; font-size: 1.1rem;">
                </div>
                <div class="modal-input-glass" style="padding: 15px;">
                    <span style="color: var(--text-dim); font-size: 1.2rem;">$</span>
                    <input type="number" id="basic-expense-amount" placeholder="0.00" step="0.01" style="width: 80%; text-align: right; font-size: 1.4rem; font-weight: bold;">
                </div>
                <div>
                    <label style="color: var(--text-dim); font-size: 0.85rem; margin-left: 5px;">PAID BY (預設全體平分)</label>
                    <div class="avatar-scroll" id="basic-paid-by-container" style="margin-top: 5px;"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; margin-top: 25px;">
                <button class="modal-close-btn" id="btn-basic-cancel" style="background: #21242D; color: #fff;">Cancel</button>
                <button class="modal-close-btn" id="btn-basic-save" style="background: var(--accent-blue); color: #000;">Save</button>
            </div>
        </div>
    </div>

    <div id="assignment-modal" class="modal-overlay hidden">
        <div class="glass-modal-card" style="max-width: 90%; width: 380px;">
            <h3 class="modal-title" style="margin-bottom: 20px;">Expense Details</h3>
            <div style="width: 100%; display: flex; flex-direction: column; gap: 20px; text-align: left;">
                <div class="modal-input-glass" style="justify-content: flex-start; padding: 15px;">
                    <input type="text" id="expense-title" placeholder="e.g. Ski Resort Dinner" style="width: 100%; text-align: left; font-size: 1.2rem;">
                </div>
                <div>
                    <label style="color: var(--text-dim); font-size: 0.85rem; margin-left: 5px;">PAID BY</label>
                    <div class="avatar-scroll" id="paid-by-container"></div>
                </div>
                <div>
                    <label style="color: var(--text-dim); font-size: 0.85rem; margin-left: 5px;">SPLIT BETWEEN</label>
                    <div class="avatar-scroll" id="split-between-container"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; margin-top: 25px;">
                <button class="modal-close-btn" id="btn-assignment-cancel" style="background: #21242D; color: #fff;">Cancel</button>
                <button class="modal-close-btn" id="btn-assignment-save" style="background: var(--accent-blue); color: #000;">Save</button>
            </div>
        </div>
    </div>

    <div id="new-trip-modal" class="modal-overlay hidden">
        <div class="glass-modal-card" style="width: 90%; max-width: 400px; padding: 25px 20px;">
            <h3 class="modal-title" id="trip-modal-title" style="margin-bottom: 20px;">Create New Trip</h3>
            <div style="width: 100%; display: flex; flex-direction: column; gap: 15px; text-align: left;">
                <div class="modal-input-glass" style="padding: 15px;">
                    <input type="text" id="new-trip-name" placeholder="e.g. Tokyo Trip 2026 🗼" style="width: 100%; text-align: left; font-size: 1.1rem;">
                </div>
                <div>
                    <label style="color: var(--text-dim); font-size: 0.85rem; margin-left: 5px;">DATE RANGE</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <div class="modal-input-glass" style="padding: 12px; flex: 1;">
                            <input type="date" id="new-trip-start" value="2026-09-02" style="width: 100%; color: var(--text-main); text-align: center;">
                        </div>
                        <div class="modal-input-glass" style="padding: 12px; flex: 1;">
                            <input type="date" id="new-trip-end" value="2026-09-10" style="width: 100%; color: var(--text-main); text-align: center;">
                        </div>
                    </div>
                </div>
                <div>
                    <label style="color: var(--text-dim); font-size: 0.85rem; margin-left: 5px;">MEMBERS</label>
                    <div class="modal-input-glass" style="padding: 10px 15px; margin-top: 5px; display: flex; justify-content: space-between;">
                        <input type="text" id="new-member-input" placeholder="e.g. Amy" style="width: 70%; text-align: left;">
                        <button id="btn-add-member" style="background: var(--accent-blue); color: #000; border: none; padding: 8px 15px; border-radius: 12px; font-weight: bold; cursor: pointer;">Add</button>
                    </div>
                </div>
                <div class="avatar-scroll" id="new-trip-members-list" style="min-height: 50px; flex-wrap: wrap; overflow: visible;"></div>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; margin-top: 25px;">
                <button class="modal-close-btn" id="btn-new-trip-cancel" style="background: #21242D; color: #fff;">Cancel</button>
                <button class="modal-close-btn" id="btn-new-trip-save" style="background: var(--accent-blue); color: #000;">Save Trip</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="glass-modal-card">
            <h3 class="modal-title" style="margin-bottom: 25px;">Setup Profile</h3>
            <div class="modal-content" style="gap: 15px; display: flex; flex-direction: column; width: 100%;">
                <div class="modal-input-glass"><label>Name</label><input type="text" id="settings-name-input" placeholder="Name"></div>
                <div class="modal-input-glass"><label>Venmo ID</label><input type="text" id="settings-venmo-input" placeholder="Without @"></div>
                <div class="modal-input-glass"><label>Zelle</label><input type="text" id="settings-zelle-input" placeholder="Phone or Email"></div>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; margin-top: 20px;">
                <button class="modal-close-btn" id="btn-settings-cancel" style="background: #21242D; color: #fff;">Cancel</button>
                <button class="modal-close-btn" id="btn-settings-save">Save Profile</button>
            </div>
        </div>
    </div>

    <div id="crop-modal" class="modal-overlay hidden">
        <div class="crop-hint">Crop to include items, Subtotal, Tax & Total</div>
        <div class="crop-container"><img id="crop-image" src="" alt="Cropper"></div>
        <div class="crop-actions">
            <button class="crop-btn cancel" id="btn-crop-cancel">Cancel</button>
            <button class="crop-btn confirm" id="btn-crop-confirm">Analyze</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="glass-modal-card">
            <h3 class="modal-title" id="modal-title">Notice</h3>
            <div class="modal-content" id="modal-content"></div>
            <button class="modal-close-btn" id="modal-close-btn">OK</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden" style="z-index: 999;">
        <div class="glass-modal-card" style="max-width: 320px; padding: 25px 20px;">
            <h3 class="modal-title" style="margin-bottom: 15px; color: #FF3B30;">Warning</h3>
            <div class="modal-content" id="confirm-message" style="margin-bottom: 25px; text-align: center; color: var(--text-main); font-size: 1.1rem;">
                Are you sure you want to delete this?
            </div>
            <div style="display: flex; gap: 10px; width: 100%;">
                <button class="modal-close-btn" id="btn-confirm-cancel" style="background: #21242D; color: #fff;">Cancel</button>
                <button class="modal-close-btn" id="btn-confirm-delete" style="background: rgba(255, 59, 48, 0.2); color: #FF3B30;">Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js?v=36.0"></script>
</body>
</html>
